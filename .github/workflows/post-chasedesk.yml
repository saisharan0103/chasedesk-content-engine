name: ChaseDesk daily content

# Runs once each morning, generates + quality-checks tweets, and schedules them
# in Typefully (Typefully fires them at the exact randomized times). The cron is
# only a trigger — it does not need to be precise.

on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC ~= 08:30 IST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: chasedesk-content
  cancel-in-progress: false

jobs:
  generate-and-schedule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so rebase before push works cleanly

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Generate & schedule
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o' }}
          TYPEFULLY_API_KEY: ${{ secrets.TYPEFULLY_API_KEY }}
          TIMEZONE: ${{ vars.TIMEZONE || 'Asia/Kolkata' }}
          POSTS_PER_DAY: ${{ vars.POSTS_PER_DAY || '3' }}
          POST_WINDOW_START: ${{ vars.POST_WINDOW_START || '09:00' }}
          POST_WINDOW_END: ${{ vars.POST_WINDOW_END || '21:00' }}
          MIN_GAP_MINUTES: ${{ vars.MIN_GAP_MINUTES || '180' }}
          CHAR_LIMIT: ${{ vars.CHAR_LIMIT || '240' }}
          HUMAN_REVIEW_COMPETITOR_POSTS: ${{ vars.HUMAN_REVIEW_COMPETITOR_POSTS || 'true' }}
        run: python -m src.orchestrator

      - name: Commit logs
        if: always()
        run: |
          git config user.name "chasedesk-bot"
          git config user.email "actions@users.noreply.github.com"
          git add logs/
          if git diff --cached --quiet; then
            echo "no log changes to commit"
            exit 0
          fi
          git commit -m "logs: $(date -u +%Y-%m-%d) run"
          # If a concurrent run pushed first, rebase on top and retry. Up to 3 attempts.
          for i in 1 2 3; do
            if git pull --rebase --autostash origin main && git push; then
              exit 0
            fi
            echo "push attempt $i failed, retrying..."
            sleep $((i * 3))
          done
          echo "push failed after 3 attempts"
          exit 1
