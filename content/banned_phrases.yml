# Hard quality-filter inputs.

# Case-insensitive substring matches. A candidate containing any of these is rejected.
banned_phrases:
  - "game-changer"
  - "game changer"
  - "gamechanger"
  - "revolutionize accounting"
  - "revolutionise accounting"
  - "revolutionary"
  - "10x your bookkeeping"
  - "10x your books"
  - "ai-powered transformation"
  - "future of accounting"
  - "set it and forget it forever"
  - "set and forget forever"
  - "transform your bookkeeping"
  - "supercharge your"
  - "next-level"
  - "unlock the power of"
  - "in today's fast-paced world"
  - "leverage cutting-edge"
  - "best-in-class"
  - "world-class"
  - "paradigm shift"
  - "disrupt the industry"
  - "skyrocket your"

# When used about a NAMED competitor, these count as forbidden attacks → reject.
competitor_attack_words:
  - "outdated"
  - "useless"
  - "inferior"
  - "garbage"
  - "trash"
  - "terrible"
  - "awful"
  - "broken"
  - "dead"
  - "obsolete"
  - "worthless"
  - "stupid"

# Regex (case-insensitive). When NO approved proof exists, a match suggests a fabricated
# metric → reject. Plain counts like "27 receipts" do not match these.
fake_metric_patterns:
  - "\\b\\d{1,3}\\s?%"
  - "\\b\\d+x\\b"
  - "save[sd]?\\s+\\$?\\d+"
  - "\\b\\d+\\s?(hours|hrs|minutes|mins)\\s+(a|per|/)\\s*(week|month|day)"
